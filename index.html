<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Plog & Go MVP</title>

<style>
body{
    font-family: sans-serif;
    background:#f3f6f4;
    text-align:center;
    margin:0;
}

.screen{
    display:none;
    padding:40px 20px;
}

.active{
    display:block;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#2e7d32;
    color:white;
    margin-top:20px;
    cursor:pointer;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- 홈 화면 -->
<div id="home" class="screen active">
    <h1>Plog & Go</h1>
    <p>환경을 지키는 러닝 앱</p>
    <button onclick="startPlogging()">플로깅 시작하기</button>
</div>

<!-- 진행 화면 -->
<div id="run" class="screen">
    <h2>플로깅 진행 중...</h2>
    <div class="card">
        <p>시간: <span id="time">0</span>초</p>
        <p>쓰레기: <span id="trash">0</span>개</p>
    </div>

    <button onclick="addTrash()">쓰레기 1개 추가</button><br>
    <button onclick="finish()">완료하기</button>
</div>

<!-- 결과 화면 -->
<div id="result" class="screen">
    <h2>오늘의 결과</h2>

    <div class="card">
        <p>플로깅 시간: <span id="finalTime"></span>초</p>
        <p>주운 쓰레기: <span id="finalTrash"></span>개</p>
    </div>

    <button onclick="goHome()">다시 시작</button>
</div>

<script>
let time = 0;
let trash = 0;
let timer;

function startPlogging(){
    document.getElementById("home").classList.remove("active");
    document.getElementById("run").classList.add("active");

    timer = setInterval(()=>{
        time++;
        document.getElementById("time").innerText = time;
    },1000);
}

function addTrash(){
    trash++;
    document.getElementById("trash").innerText = trash;
}

function finish(){
    clearInterval(timer);

    document.getElementById("run").classList.remove("active");
    document.getElementById("result").classList.add("active");

    document.getElementById("finalTime").innerText = time;
    document.getElementById("finalTrash").innerText = trash;
}

function goHome(){
    location.reload();
}
</script>

</body>
</html>
